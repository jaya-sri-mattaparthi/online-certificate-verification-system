<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Online Course Certificate Verification System (MOOCs)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Outer page: pure black */
    html,body { height:100%; margin:0; }
    body {
      background: #000;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color: #dbeeff;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card {
      width:100%;
      max-width:720px;
      background: linear-gradient(180deg, rgba(8,12,14,0.98), rgba(6,9,12,0.96));
      border-radius:16px;
      padding:28px;
      box-shadow:0 18px 40px rgba(0,0,0,0.7);
      border:1px solid rgba(255,255,255,0.03);
    }

    /* Title */
    h1 { margin:0; font-size:1.6rem; text-align:center; color:#fff; letter-spacing:-0.2px; }
    .platform-list { color: rgba(220,230,240,0.72); font-weight:400; font-size:0.95rem; display:block; margin-top:6px; text-align:center; }

    /* Dark input styles - force non-white even with autofill */
    .dark-input {
      width:100%;
      background:#071423 !important;
      color:#e6f6ff !important;
      border:1px solid rgba(255,255,255,0.04);
      padding:10px 12px;
      border-radius:8px;
      outline:none;
      font-size:0.96rem;
      -webkit-appearance:none;
      appearance:none;
      box-shadow: inset 0 -2px 6px rgba(0,0,0,0.45);
    }
    .dark-input::placeholder { color: rgba(230,246,255,0.45); }

    /* Force Chrome autofill to match dark theme */
    input.dark-input:-webkit-autofill,
    select.dark-input:-webkit-autofill,
    textarea.dark-input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0px 1000px #071423 inset !important;
      box-shadow: 0 0 0px 1000px #071423 inset !important;
      -webkit-text-fill-color: #e6f6ff !important;
    }

    /* Option styling (may vary by browser) */
    option { background:#071423; color:#e6f6ff; }

    .select-wrap { position:relative; }
    .select-wrap::after {
      content: "";
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      width:10px; height:10px;
      pointer-events:none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="%23cfe9ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
      background-repeat:no-repeat;
      background-position:center;
      opacity:0.9;
    }

    label { display:block; color: rgba(220,230,240,0.75); margin-bottom:8px; font-size:0.92rem; }

    /* custom file chooser */
    .file-wrap {
      display:flex; gap:.6rem; align-items:center; padding:8px;
      border-radius:8px; background:#071423; color:#dbeeff; border:1px solid rgba(255,255,255,0.02);
    }
    .file-btn {
      background: linear-gradient(90deg,#06c6b3 0%, #2b99f0 100%);
      color:#fff; padding:8px 12px; border-radius:6px; border:none; cursor:pointer; font-size:0.92rem;
      box-shadow: 0 8px 18px rgba(11,80,110,0.12);
    }
    .file-name { padding:8px 12px; border-radius:6px; background: rgba(255,255,255,0.02); color:#cfe9ff; font-size:0.92rem; }

    /* action buttons */
    .actions { display:flex; gap:12px; margin-top:8px; }
    .btn-accent {
      flex:1; background: linear-gradient(90deg,#06c6b3 0%, #2b99f0 100%); color:#fff; padding:12px 14px; border-radius:10px; border:none;
      font-weight:600; cursor:pointer; box-shadow:0 12px 30px rgba(43,153,240,0.08);
    }
    .btn-secondary {
      background:transparent; color:#cfe9ff; padding:12px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.04); cursor:pointer; min-width:96px;
    }

    .note { color: rgba(220,230,240,0.6); text-align:center; margin-top:14px; font-size:0.88rem; }

    /* preview */
    #preview { max-height:260px; border-radius:8px; border:1px solid rgba(255,255,255,0.03); display:block; margin:12px auto 0; box-shadow:0 12px 30px rgba(0,0,0,0.45); }

    /* hide native file input */
    input[type="file"] { display:none !important; }

    @media (max-width:640px) { .card { padding:18px; border-radius:12px; } }
  </style>
</head>
<body>
  <div class="card">
    <h1><strong>Online Course Certificate Verification System</strong> <span style="font-weight:400;">(MOOCs)</span></h1>
    <span class="platform-list">(Coursera, Udacity, edX, Upgrad, FreeCodeCamp)</span>

    <form id="verifyForm" method="POST" enctype="multipart/form-data" class="space-y-4" style="margin-top:16px;">

      <div>
        <label for="platform">Platform</label>
        <div class="select-wrap">
          <select id="platform" name="platform" required class="dark-input">
            <option value="">Select platform</option>
            <option value="Coursera">Coursera</option>
            <option value="Udacity">Udacity</option>
            <option value="Edx">edX</option>
            <option value="Upgrad">Upgrad</option>
            <option value="FreeCodeCamp">FreeCodeCamp</option>
          </select>
        </div>
      </div>

      <div>
        <label for="model">Verification Model</label>
        <div class="select-wrap">
          <select id="model" name="model" class="dark-input">
            <option value="ocr">OCR Model</option>
            <option value="ai">AI Agent</option>
          </select>
        </div>
      </div>

      <div>
        <label for="serial">Serial Number</label>
        <input id="serial" name="serial" type="text" required placeholder="Enter Serial Number" class="dark-input" />
      </div>

      <div>
        <label>Upload Certificate Image</label>
        <input id="imageInput" name="image" type="file" accept="image/*" required>
        <div class="file-wrap">
          <button type="button" id="fileBtn" class="file-btn">Choose file</button>
          <div id="fileName" class="file-name">No file chosen</div>
        </div>
        <img id="preview" src="#" alt="preview" style="display:none;" />
      </div>

      <div class="actions">
        <button type="submit" class="btn-accent">Verify Certificate</button>
        <button type="reset" id="resetBtn" class="btn-secondary">Reset</button>
      </div>

    </form>

    <p class="note">Upload a certificate image and verify authenticity using OCR or the AI Agent.</p>
  </div>

<script>
  const imageInput = document.getElementById('imageInput');
  const fileBtn = document.getElementById('fileBtn');
  const fileName = document.getElementById('fileName');
  const preview = document.getElementById('preview');
  const verifyForm = document.getElementById('verifyForm');
  const resetBtn = document.getElementById('resetBtn');

  // forward click to hidden input
  fileBtn.addEventListener('click', () => imageInput.click());

  imageInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) {
      fileName.textContent = 'No file chosen';
      preview.style.display = 'none';
      preview.src = '#';
      return;
    }
    fileName.textContent = file.name;
    const url = URL.createObjectURL(file);
    preview.src = url;
    preview.style.display = 'block';
  });

  resetBtn.addEventListener('click', () => {
    fileName.textContent = 'No file chosen';
    preview.style.display = 'none';
    preview.src = '#';
  });

  // guard to ensure file selected before submit
  verifyForm.addEventListener('submit', (e) => {
    if (!imageInput.files.length) {
      e.preventDefault();
      alert('Please choose a certificate image before submitting.');
    }
  });
</script>
</body>
</html>
